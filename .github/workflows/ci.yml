name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: JVM tests (includes commonTest)
        run: ./gradlew :composeApp:jvmTest --stacktrace

      - name: Shared Android compile
        run: ./gradlew :composeApp:compileAndroidMain --stacktrace

      - name: JS compile
        run: ./gradlew :composeApp:compileKotlinJs --stacktrace

      - name: Wasm compile
        run: ./gradlew :composeApp:compileKotlinWasmJs --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            composeApp/build/reports/tests/
            composeApp/build/test-results/
          if-no-files-found: ignore
          retention-days: 14
